name: "@lando/notify-lando"
version: "0.0.0"
api: 4
description: "Bundled Lando desktop-notification policy plugin."
enabled: true
updateable: true
entry: ./src/index.ts

subscribers:
  - id: notify-command-terminal
    selectors:
      - family: cli-command-terminal
    module: ./src/notify.ts
    priority: 900
    configKey: notify

requires:
  "@lando/core": "^4.0.0"
