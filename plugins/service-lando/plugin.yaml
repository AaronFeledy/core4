name: "@lando/service-lando"
version: "0.0.0"
api: 4
description: "The opinionated `lando` service base."
enabled: true
updateable: true
entry: ./src/index.ts

contributes:
  serviceTypes:
    - "apache"
    - "compose"
    - "elasticsearch"
    - "elasticsearch:8"
    - "go:1.22"
    - "go:1.23"
    - "mariadb"
    - "meilisearch"
    - "meilisearch:1"
    - "memcached"
    - "mongodb"
    - "mysql"
    - "nginx"
    - "node:lts"
    - "node:22"
    - "opensearch"
    - "opensearch:2"
    - "postgres"
    - "php:8.2"
    - "php:8.3"
    - "python:3.12"
    - "redis"
    - "ruby:3.3"
    - "solr"
    - "solr:9"
    - "static"
    - "static:nginx"
    - "static:caddy"
    - "valkey"
  serviceFeatures:
    - "lando.user-id"
    - "lando.storage"
    - "lando.env"
    - "lando.app-mount"
    - "lando.healthcheck"
    - "lando.user"

requires:
  "@lando/core": "^4.0.0"
