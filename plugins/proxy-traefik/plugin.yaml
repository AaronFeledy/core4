# @lando/proxy-traefik — Traefik-backed ProxyService.

name: "@lando/proxy-traefik"
version: "0.0.0"
api: 4
description: "Traefik-backed ProxyService implementation."
enabled: true
updateable: true

provides:
  proxyServices:
    - id: traefik
      module: ./src/proxy.ts
      defaultFor:
        platform: [darwin, linux, win32]
  globalServices:
    - id: traefik
      module: ./src/global-services/traefik.ts
      enabledByDefault: true
      requires:
        providerCapabilities: [sharedCrossAppNetwork]

requires:
  "@lando/core": "^4.0.0"
