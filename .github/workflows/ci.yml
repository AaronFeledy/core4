  build-win32-x64:
    needs: [static-checks, schema-snapshot, bundled-codegen, library-api-tests, recipe-tests]
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
