  guide-scenarios-linux-x64:
    needs: [static-checks, build-linux-x64]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate guide scenarios
        run: bun run codegen

      - name: Typecheck
        run: bun run typecheck

      - name: Lint guides
        run: bun run lint:guides

      - name: Check guide coverage
        run: bun run check:guide-coverage

      - name: Check public transcripts
        run: bun run check:public-transcripts

      - name: Check guide drift
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GUIDE_DRIFT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GUIDE_DRIFT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          GUIDE_DRIFT_PR_BODY="$(gh pr view ${{ github.event.pull_request.number }} --json body --jq .body)" bun run check:guide-drift

      - name: Run generated guide scenarios
        run: bun run scripts/test-reporters/run-guide-scenarios.ts test/scenarios/generated/guides/**

      - name: Download Linux x64 binary artifact
        uses: actions/download-artifact@v4
        with:
          name: lando-linux-x64
          path: dist

      - name: Restore binary executable bit
        run: chmod +x dist/lando

      - name: Provision rootless runtime prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! grep -q "^$(id -un):" /etc/subuid; then
            echo "$(id -un):100000:65536" | sudo tee -a /etc/subuid
          fi
          if ! grep -q "^$(id -un):" /etc/subgid; then
            echo "$(id -un):100000:65536" | sudo tee -a /etc/subgid
          fi
          sudo sysctl net.ipv4.ip_unprivileged_port_start=0
          if test -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns; then
            sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if ! grep -q "systemd.unified_cgroup_hierarchy" /proc/cmdline; then
            echo "::notice title=ci-runtime::cgroups v2 unified hierarchy assumed via ubuntu-24.04 default (systemd.unified_cgroup_hierarchy)"
          fi
          sudo mkdir -p /sys/fs/cgroup/user.slice/user-$(id -u).slice
          sudo chown -R "$(id -un)" "/sys/fs/cgroup/user.slice/user-$(id -u).slice" || true

      - name: Install Podman 6 toolchain (Homebrew; Ubuntu/OBS lack Podman 6)
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! command -v brew >/dev/null 2>&1; then
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          brew install podman
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LANDO_CI_PODMAN_HELPER_DIR=$BREW_PREFIX/opt/podman/libexec/podman" >> "$GITHUB_ENV"
          # The OCI runtime and monitor are separate Homebrew formulae that Homebrew does
          # not link onto PATH, so a bundle-staging step that searches PATH would copy
          # the runner's preinstalled (older) crun/conmon and Podman 6 would reject their
          # OCI config version. Export the Podman 6 toolchain directories so staging can
          # prefer them over the system copies.
          toolchain_dirs="$BREW_PREFIX/opt/podman/libexec/podman:$BREW_PREFIX/bin"
          for dep in crun conmon fuse-overlayfs; do
            dep_prefix="$(brew --prefix "$dep" 2>/dev/null || true)"
            if test -n "$dep_prefix" && test -d "$dep_prefix/bin"; then
              toolchain_dirs="$dep_prefix/bin:$toolchain_dirs"
            fi
          done
          echo "LANDO_CI_PODMAN_TOOLCHAIN_DIRS=$toolchain_dirs" >> "$GITHUB_ENV"
          # The managed runtime resolves its OCI runtime from the default system search
          # list (/usr/bin/crun first), not from the bundle or helper_binaries_dir, so a
          # runner's preinstalled crun that predates Podman 6 makes container start fail
          # with "crun: unknown version specified". Overwrite the default-path crun with
          # the Podman 6 toolchain build (its interpreter/RPATH stay absolute to the
          # Homebrew prefix, which persists on the runner).
          crun_prefix="$(brew --prefix crun 2>/dev/null || true)"
          if test -n "$crun_prefix" && test -x "$crun_prefix/bin/crun"; then
            sudo install -m 0755 "$crun_prefix/bin/crun" /usr/bin/crun
          fi
          # User-level container configs override any system files wholesale, so seed
          # them instead of mutating /etc: a distro-era /etc/containers/registries.conf
          # can be v1-format TOML, and appending v2 keys to it makes every podman
          # engine load fail with "registries.conf must be in v2 format but is in v1".
          mkdir -p "$HOME/.config/containers"
          if ! test -f "$HOME/.config/containers/registries.conf"; then
            printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
          fi
          if ! test -f "$HOME/.config/containers/policy.json" && ! test -f /etc/containers/policy.json; then
            printf '{"default":[{"type":"insecureAcceptAnything"}]}\n' > "$HOME/.config/containers/policy.json"
          fi
          # A system-level storage.conf left behind by a distro podman install pins the
          # rootful runroot/graphroot, which Podman 6 honors literally for rootless
          # users. Seed a rootless-safe user-level storage.conf so the default service
          # always resolves user paths.
          if ! test -f "$HOME/.config/containers/storage.conf"; then
            printf '[storage]\ndriver = "overlay"\nrunroot = "%s"\ngraphroot = "%s"\n' \
              "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers" \
              "$HOME/.local/share/containers/storage" > "$HOME/.config/containers/storage.conf"
          fi
          podman --version

      - name: Assert Podman 6 host contract
        run: |
          MINIMUM="6.0.0"
          version_output="$(podman --version 2>/dev/null || true)"
          numbers="$(printf '%s\n' "$version_output" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          remediation="Install Podman >= $MINIMUM (Homebrew formula: podman) before Podman-backed CI runs."
          if test -z "$numbers"; then
            echo "::error title=podman6-contract::Could not parse a Podman version from '${version_output:-<no podman on PATH>}'. $remediation"
            exit 1
          fi
          major="${numbers%%.*}"
          minor_patch="${numbers#*.}"
          minor="${minor_patch%%.*}"
          patch="${minor_patch#*.}"
          floor_major="${MINIMUM%%.*}"
          floor_minor_patch="${MINIMUM#*.}"
          floor_minor="${floor_minor_patch%%.*}"
          floor_patch="${floor_minor_patch#*.}"
          meets=yes
          if test "$major" -lt "$floor_major"; then
            meets=no
          elif test "$major" -eq "$floor_major"; then
            if test "$minor" -lt "$floor_minor"; then
              meets=no
            elif test "$minor" -eq "$floor_minor" && test "$patch" -lt "$floor_patch"; then
              meets=no
            fi
          fi
          if test "$meets" = no; then
            echo "::error title=podman6-contract::Podman $numbers (from '$version_output') does not satisfy the >= $MINIMUM host contract. $remediation"
            exit 1
          fi
          echo "podman6-contract: $numbers satisfies >= $MINIMUM"

      - name: Stage current-commit runtime bundle
        run: |
          mkdir -p dist/cache/runtime-bundle
          STAGE="$(mktemp -d)"
          cp "$(command -v podman)" "$STAGE/podman"
          for helper in newuidmap newgidmap pasta passt rootlessport catatonit slirp4netns fuse-overlayfs crun runc conmon netavark aardvark-dns gvproxy; do
            src=""
            IFS=":"
            for dir in ${LANDO_CI_PODMAN_TOOLCHAIN_DIRS:-}; do
              if test -x "$dir/$helper"; then src="$dir/$helper"; break; fi
            done
            unset IFS
            if test -z "$src"; then src="$(command -v "$helper" 2>/dev/null || true)"; fi
            if test -z "$src" && test -x "/usr/lib/podman/$helper"; then src="/usr/lib/podman/$helper"; fi
            if test -n "$src"; then cp "$src" "$STAGE/$helper"; fi
          done
          tar -czf dist/cache/runtime-bundle/lando-runtime-linux-x64.tar.gz -C "$STAGE" .
          rm -rf "$STAGE"

      - name: Build local runtime bundle manifest
        run: |
          MANIFEST="$(bun run scripts/build-runtime-bundle.ts --local --platform linux-x64)"
          echo "LANDO_RUNTIME_BUNDLE_MANIFEST=$MANIFEST" >> "$GITHUB_ENV"

      - name: Configure rootless overlay storage
        run: |
          cat > dist/cache/runtime-bundle/storage.conf <<EOF
          [storage]
          driver = "overlay"

          [storage.options.overlay]
          mount_program = "$HOME/.local/share/lando/runtime/bin/fuse-overlayfs"
          EOF
          echo "CONTAINERS_STORAGE_CONF=$GITHUB_WORKSPACE/dist/cache/runtime-bundle/storage.conf" >> "$GITHUB_ENV"

      - name: Prepare provider via lando setup
        run: |
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "$XDG_RUNTIME_DIR"
          dist/lando setup --yes --provider=lando --skip-install-ca --skip-shell-integration --skip-file-sync
          echo "LANDO_CONFIG__default_provider_id=lando" >> "$GITHUB_ENV"

      - name: Verify managed runtime socket
        run: |
          for _ in {1..30}; do
            test -S "$HOME/.local/share/lando/runtime/run/podman.sock" && break
            sleep 1
          done
          test -S "$HOME/.local/share/lando/runtime/run/podman.sock"

      - name: Configure Docker socket
        run: |
          test -S /var/run/docker.sock
          echo "LANDO_TEST_DOCKER_SOCKET=/var/run/docker.sock" >> "$GITHUB_ENV"

      - name: Pre-pull container images
        run: |
          LANDO_PODMAN="$HOME/.local/share/lando/runtime/bin/podman"
          LANDO_PODMAN_ARGS=(--root "$HOME/.local/share/lando/runtime/storage" --runroot "$HOME/.local/share/lando/runtime/run" --config "$HOME/.local/share/lando/runtime/config")
          pull_image() {
            local image="$1"
            for attempt in 1 2 3; do
              "$LANDO_PODMAN" "${LANDO_PODMAN_ARGS[@]}" pull "$image" && return 0
              if test "$attempt" -eq 3; then return 1; fi
              sleep $((attempt * 5))
            done
          }
          docker_pull_image() {
            local image="$1"
            for attempt in 1 2 3; do
              docker pull "$image" && return 0
              if test "$attempt" -eq 3; then return 1; fi
              sleep $((attempt * 5))
            done
          }
          pull_image docker.io/library/alpine:3.21
          pull_image docker.io/library/node:lts
          pull_image docker.io/library/node:22-alpine
          pull_image docker.io/library/node:22
          pull_image docker.io/library/postgres:16
          pull_image docker.io/library/postgres:16-alpine
          pull_image docker.io/library/golang:1.22
          pull_image docker.elastic.co/elasticsearch/elasticsearch:8.17.0
          pull_image docker.io/getmeili/meilisearch:v1.11
          pull_image docker.io/axllent/mailpit:v1.30.1
          pull_image docker.io/library/memcached:1.6
          pull_image docker.io/library/nginx:1.27
          pull_image docker.io/opensearchproject/opensearch:2
          pull_image docker.io/library/solr:9
          pull_image docker.io/library/traefik:v3.3
          pull_image docker.io/valkey/valkey:8
          docker_pull_image docker.io/library/node:22-alpine
          docker_pull_image docker.io/library/node:22

      - name: Run e2e smoke guide scenarios
        env:
