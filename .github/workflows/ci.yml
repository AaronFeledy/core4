# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-ci-workflow.ts instead.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  static-checks-platform:
    strategy:
      fail-fast: false
      matrix:
        platform: [darwin-arm64, darwin-x64, linux-arm64, linux-x64, windows-x64]
        include:
          - platform: darwin-arm64
            runs-on: macos-15
          - platform: darwin-x64
            runs-on: macos-15-intel
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
          - platform: linux-x64
            runs-on: ubuntu-24.04
          - platform: windows-x64
            runs-on: windows-2022
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Renderer boundary lint
        run: bun run check:renderer-boundary

      - name: Managed-file boundary lint
        run: bun run check:managed-file-boundary

      - name: Telemetry inventory lint
        run: bun run check:telemetry-inventory

      - name: Redaction boundary lint
        run: bun run check:redaction-boundary

      - name: Env helper boundary lint
        run: bun run check:env-helper-boundary

      - name: Paths boundary lint
        run: bun run check:paths-boundary

      - name: State-store boundary lint
        run: bun run check:state-store-boundary

      - name: Probe boundary lint
        run: bun run check:probe-boundary

      - name: Static scope notice for portable-only platforms
        if: ${{ matrix.platform != 'linux-x64' }}
        run: |
          echo "::notice title=static-checks-scope::${{ matrix.platform }} runs fork-safe portable static gates only; linux-x64 runs the full static test suite. Full cross-platform static test portability is tracked separately by US-189."

      - name: Unit test layer (linux-x64 full static scope)
        if: ${{ matrix.platform == 'linux-x64' }}
        run: bun run test:unit

      - name: Report job timing
        if: always()
        run: |
          echo "::notice title=ci-timing::static-checks/${{ matrix.platform }} completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 35m)"

  static-checks:
    needs: [static-checks-platform]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Confirm static-checks platform matrix
        run: |
          if [[ "${{ needs.static-checks-platform.result }}" != "success" ]]; then
            echo "static-checks platform matrix result: ${{ needs.static-checks-platform.result }}"
            exit 1
          fi
          echo "static-checks platform matrix passed"

