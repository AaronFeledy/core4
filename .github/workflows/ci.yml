      - name: Build win32-x64 binary
        run: |
          mkdir -p dist
          bun build ./core/bin/lando.ts --compile --target=bun-windows-x64 --outfile ./dist/lando.exe --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./dist/lando.exe

      - name: Smoke test binary
        run: |
