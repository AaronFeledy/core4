          path: dist/lando.exe
          if-no-files-found: ignore
          retention-days: 7

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::build-win32-x64 completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 35m)"

  provider-integration-darwin-arm64:
    needs: [build-darwin-arm64]
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download darwin-arm64 binary artifact
        uses: actions/download-artifact@v4
        with:
          name: lando-darwin-arm64
          path: dist

      - name: Restore binary executable bit
        run: chmod +x dist/lando

      - name: Run provider contract tests
        run: |
          bun test sdk/test/contract/provider.test.ts sdk/test/contract/service.test.ts
          bun test plugins/provider-lando/test/contract.integration.test.ts
          bun test plugins/provider-docker/test/contract.integration.test.ts
          bun test plugins/provider-podman/test/contract.integration.test.ts
          bun test plugins/provider-podman/test/capabilities.test.ts

      - name: Upload provider integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-integration-diagnostics-darwin-arm64
          path: provider-diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::provider-integration-darwin-arm64 completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 20m)"

