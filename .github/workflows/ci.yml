# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-ci-workflow.ts instead.
# Test globs from bunfig.toml:
#   - core/test/**/*.test.ts
#   - sdk/test/**/*.test.ts
#   - plugins/*/test/**/*.test.ts
# Bundled plugins from BUNDLED_PLUGINS:
#   - @lando/provider-lando
#   - @lando/provider-docker
#   - @lando/provider-podman
#   - @lando/service-lando
#   - @lando/logger-pretty
#   - @lando/file-sync-mutagen
#   - @lando/proxy-traefik
#   - @lando/template-handlebars
#   - @lando/template-mustache
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  static-checks-platform:
    strategy:
      fail-fast: false
      matrix:
        platform: [darwin-arm64, darwin-x64, linux-arm64, linux-x64, win32-x64]
        include:
          - platform: darwin-arm64
            runs-on: macos-15
          - platform: darwin-x64
            runs-on: macos-15-intel
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
          - platform: linux-x64
            runs-on: ubuntu-24.04
          - platform: win32-x64
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Renderer boundary lint
        run: bun run check:renderer-boundary

      - name: Unit test layer
        run: bun run test:unit

      - name: Effect service, CLI, and scenario test layers
        run: bun test core/test/services core/test/cli core/test/scenario

      - name: Recipe test layer
        run: bun test core/test/recipes core/test/cli/init.canonical-recipes.test.ts

      - name: Library API test layer
        run: bun test core/test/library sdk/test/library

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::static-checks/${{ matrix.platform }} completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 35m)"

  static-checks:
    needs: [static-checks-platform]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Confirm static-checks platform matrix
        run: |
          if [[ "${{ needs.static-checks-platform.result }}" != "success" ]]; then
            echo "static-checks platform matrix result: ${{ needs.static-checks-platform.result }}"
            exit 1
          fi
          echo "static-checks platform matrix passed"

  schema-snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate schema snapshot
        run: bun run codegen:schema-snapshot

      - name: Verify schema snapshot is current
        run: git diff --exit-code -- sdk/test/fixtures/schema-snapshot.json

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::schema-snapshot completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 15m)"

  bundled-codegen:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate bundled plugins
        run: bun run codegen:bundled-plugins

      - name: Regenerate bundled recipes
        run: bun run codegen:bundled-recipes

      - name: Verify bundled codegen is current
        run: git diff --exit-code -- core/src/plugins/bundled.ts core/src/recipes/bundled.ts

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::bundled-codegen completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 15m)"

  library-api-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run library API tests
        run: bun test core/test/library sdk/test/library

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::library-api-tests completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 15m)"

  recipe-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
