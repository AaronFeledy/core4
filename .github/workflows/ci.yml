    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate schema snapshot
        run: bun run codegen:schema-snapshot

      - name: Verify schema snapshot is current
        run: git diff --exit-code -- sdk/test/fixtures/schema-snapshot.json dist/schemas docs/reference/schemas

      - name: Report job timing
        if: always()
        run: |
          echo "::notice title=ci-timing::schema-snapshot completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 15m)"

