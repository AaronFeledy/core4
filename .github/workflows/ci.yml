  guide-scenarios-linux-x64:
    needs: [static-checks]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate guide scenarios
        run: bun run codegen

      - name: Typecheck
        run: bun run typecheck

      - name: Lint guides
        run: bun run lint:guides

      - name: Check guide coverage
        run: bun run check:guide-coverage

      - name: Check guide drift
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GUIDE_DRIFT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GUIDE_DRIFT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GUIDE_DRIFT_PR_BODY: ${{ github.event.pull_request.body }}
        run: bun run check:guide-drift

      - name: Run generated guide scenarios
        run: bun test test/scenarios/generated/guides/**

      - name: Upload guide scenario transcripts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: guide-scenario-transcripts-${{ github.run_id }}.zip
          path: dist/transcripts/guides/**/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::guide-scenarios-linux-x64 completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 20m)"

  build-darwin-arm64:
    needs: [static-checks, schema-snapshot, bundled-codegen, library-api-tests, recipe-tests]
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OCLIF manifest
        run: bun run --filter='@lando/core' build:manifest

      - name: Build darwin-arm64 binary
        run: |
          mkdir -p dist
          bun build ./core/bin/lando.ts --compile --target=bun-darwin-arm64 --outfile ./dist/lando --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./dist/lando

      - name: Smoke test binary
        run: |
          test -f dist/lando
          ./dist/lando --version
          ./dist/lando --help

      - name: Upload darwin-arm64 binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lando-darwin-arm64
          path: dist/lando
          if-no-files-found: ignore
          retention-days: 7

      - name: Report job timing
        if: always()
        run: echo "::notice title=ci-timing::build-darwin-arm64 completed in $(($(date +%s)-CI_JOB_STARTED_AT))s (timeout cap: 30m)"

  build-darwin-x64:
    needs: [static-checks, schema-snapshot, bundled-codegen, library-api-tests, recipe-tests]
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Mark job start
        run: echo "CI_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OCLIF manifest
        run: bun run --filter='@lando/core' build:manifest

      - name: Build darwin-x64 binary
        run: |
