# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-release-workflow.ts instead.
name: release

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  dev-prerelease-linux-x64:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Download Linux x64 binary artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ github.event.workflow_run.id }}" --name lando-linux-x64 --dir dist

      - name: Restore binary executable bit
        run: chmod +x dist/lando

      - name: Install first-launch sandbox tools
        run: |
          sudo apt-get update
          sudo apt-get install -y strace iproute2

      - name: Sandboxed first launch has no non-loopback network calls
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/lando-conf" "$RUNNER_TEMP/lando-data" "$RUNNER_TEMP/lando-cache"
          sudo env LANDO_USER_CONF_ROOT="$RUNNER_TEMP/lando-conf" LANDO_USER_DATA_ROOT="$RUNNER_TEMP/lando-data" LANDO_USER_CACHE_ROOT="$RUNNER_TEMP/lando-cache" unshare --net sh -c '
            set -euo pipefail
            ip link set lo up
            strace -f -e trace=network -o dist/first-launch.network.log ./dist/lando --version
          '
          awk '/connect\(/ && $0 !~ /(127\.|::1|AF_UNIX)/ { bad = 1 } END { exit bad }' dist/first-launch.network.log

      - name: Write SHA256SUMS
        run: |
          cd dist
          sha256sum lando > SHA256SUMS
          grep -Eq '^[0-9a-f]{64}  lando$' SHA256SUMS

      - name: Publish dev prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v4.0.0-dev.${{ github.run_number }}
        run: |
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$RELEASE_TAG" dist/lando dist/SHA256SUMS --prerelease --target "${{ github.event.workflow_run.head_sha }}" --title "Lando v4 dev ${{ github.run_number }}" --notes "Generated Linux x64 dev prerelease from successful ci workflow run ${{ github.event.workflow_run.id }}."

  npm-beta-packages:
    if: github.event.workflow_run.conclusion == 'success'
    needs: [dev-prerelease-linux-x64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package artifacts
        run: |
          bun run --filter='@lando/sdk' build
          bun run --filter='@lando/container-runtime' build
          bun run --filter='@lando/provider-lando' build
          bun run --filter='@lando/provider-docker' build
          bun run --filter='@lando/provider-podman' build
          bun run --filter='@lando/service-lando' build
          bun run --filter='@lando/logger-pretty' build
          bun run --filter='@lando/file-sync-mutagen' build
          bun run --filter='@lando/proxy-traefik' build
          bun run --filter='@lando/template-handlebars' build
          bun run --filter='@lando/template-mustache' build
          bun run --filter='@lando/core' typecheck
          bun run --filter='@lando/core' build:manifest

      - name: Prepare beta package metadata
        env:
          LANDO_NPM_VERSION: 4.0.0-beta.${{ github.run_number }}
          LANDO_NPM_DIST_TAG: next
        run: bun run scripts/prepare-npm-dev-packages.ts

      - name: Dry-run npm next publishes
        run: |
          npm publish --workspace @lando/sdk --dry-run --access public --tag next
          npm publish --workspace @lando/container-runtime --dry-run --access public --tag next
          npm publish --workspace @lando/core --dry-run --access public --tag next
          npm publish --workspace @lando/provider-lando --dry-run --access public --tag next
          npm publish --workspace @lando/provider-docker --dry-run --access public --tag next
          npm publish --workspace @lando/provider-podman --dry-run --access public --tag next
          npm publish --workspace @lando/service-lando --dry-run --access public --tag next
          npm publish --workspace @lando/logger-pretty --dry-run --access public --tag next
          npm publish --workspace @lando/file-sync-mutagen --dry-run --access public --tag next
          npm publish --workspace @lando/proxy-traefik --dry-run --access public --tag next
          npm publish --workspace @lando/template-handlebars --dry-run --access public --tag next
          npm publish --workspace @lando/template-mustache --dry-run --access public --tag next

      - name: Publish npm next packages
        run: |
          before_latest="$(npm view @lando/core dist-tags.latest --json 2>/dev/null || true)"
          npm publish --workspace @lando/sdk --access public --tag next --provenance
          npm publish --workspace @lando/container-runtime --access public --tag next --provenance
          npm publish --workspace @lando/core --access public --tag next --provenance
          npm publish --workspace @lando/provider-lando --access public --tag next --provenance
          npm publish --workspace @lando/provider-docker --access public --tag next --provenance
          npm publish --workspace @lando/provider-podman --access public --tag next --provenance
          npm publish --workspace @lando/service-lando --access public --tag next --provenance
          npm publish --workspace @lando/logger-pretty --access public --tag next --provenance
          npm publish --workspace @lando/file-sync-mutagen --access public --tag next --provenance
          npm publish --workspace @lando/proxy-traefik --access public --tag next --provenance
          npm publish --workspace @lando/template-handlebars --access public --tag next --provenance
          npm publish --workspace @lando/template-mustache --access public --tag next --provenance
          after_latest="$(npm view @lando/core dist-tags.latest --json 2>/dev/null || true)"
          test "$before_latest" = "$after_latest"
          npm view @lando/core dist-tags.next --json | grep -Eq '"?4\.0\.0-beta\.[0-9]+"?'

      - name: Retire npm dev dist-tags
        run: |
          npm dist-tag rm @lando/sdk dev 2>/dev/null || true
          npm dist-tag rm @lando/container-runtime dev 2>/dev/null || true
          npm dist-tag rm @lando/core dev 2>/dev/null || true
          npm dist-tag rm @lando/provider-lando dev 2>/dev/null || true
          npm dist-tag rm @lando/provider-docker dev 2>/dev/null || true
          npm dist-tag rm @lando/provider-podman dev 2>/dev/null || true
          npm dist-tag rm @lando/service-lando dev 2>/dev/null || true
          npm dist-tag rm @lando/logger-pretty dev 2>/dev/null || true
          npm dist-tag rm @lando/file-sync-mutagen dev 2>/dev/null || true
          npm dist-tag rm @lando/proxy-traefik dev 2>/dev/null || true
          npm dist-tag rm @lando/template-handlebars dev 2>/dev/null || true
          npm dist-tag rm @lando/template-mustache dev 2>/dev/null || true
