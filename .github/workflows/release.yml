# Release workflow 
#
# Triggered by tag pushes (`v*.*.*`). Runs the ordered build pipeline from
# the build pipeline — typecheck, codegen, per-platform `bun build --compile`, library
# build — and uploads artifacts to a GitHub Release.
#
# Signing, notarization, SBOM, SLSA provenance, and the curl|sh installer
# manifest are scaffolded but not wired yet (see scripts/release.ts).
name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  compile:
    name: compile-${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: linux-x64
            artifact: lando-linux-x64
          - os: ubuntu-24.04-arm
            os-name: linux-arm64
            artifact: lando-linux-arm64
          - os: macos-13
            os-name: macos-x64
            artifact: lando-macos-x64
          - os: macos-14
            os-name: macos-arm64
            artifact: lando-macos-arm64
          - os: windows-latest
            os-name: windows-x64
            artifact: lando-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile single-binary
        working-directory: ./core
        run: bun run build:compile

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-bin
          cp core/dist/lando dist-bin/${{ matrix.artifact }}

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist-bin
          copy core\dist\lando.exe dist-bin\${{ matrix.artifact }}
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: github-release
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true

      - name: Generate checksums
        working-directory: ./dist-bin
        run: sha256sum lando-* > SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist-bin/lando-*
            dist-bin/SHA256SUMS
