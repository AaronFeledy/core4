# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-provider-matrix-workflow.ts instead.
name: provider-matrix

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-contracts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - cell: docker-desktop-macos
            engine: Docker Desktop
            runs-on: macos-15
            provider: docker
            installable: false
            notice: Docker Desktop requires a licensed desktop app and is not installed on GitHub-hosted macOS runners.
          - cell: docker-engine-linux
            engine: Docker Engine
            runs-on: ubuntu-24.04
            provider: docker
            installable: true
            notice: GitHub-hosted CI runtime is available.
          - cell: podman-desktop-macos
            engine: Podman Desktop
            runs-on: macos-15
            provider: podman
            installable: false
            notice: Podman Desktop is not installable in GitHub-hosted CI; run this cell on a prepared self-hosted runner.
          - cell: podman-linux
            engine: Podman
            runs-on: ubuntu-24.04
            provider: lando
            installable: true
            notice: GitHub-hosted CI runtime is available.
          - cell: lima-macos
            engine: Lima
            runs-on: macos-15
            provider: docker
            installable: false
            notice: Lima provider coverage needs a prepared macOS runtime; GitHub-hosted runners do not ship a reusable Lima daemon.
          - cell: orbstack-macos
            engine: OrbStack
            runs-on: macos-15
            provider: docker
            installable: false
            notice: OrbStack is a macOS desktop runtime and is not installable in GitHub-hosted CI.
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Notice unsupported hosted runner cell
        if: ${{ matrix.installable == false }}
        run: |
          echo "::notice title=provider-matrix::${{ matrix.engine }} skipped: ${{ matrix.notice }}"

      - name: Install Podman 6 toolchain (Homebrew; Ubuntu/OBS lack Podman 6)
        if: ${{ matrix.cell == 'podman-linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! command -v brew >/dev/null 2>&1; then
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          brew install podman
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LANDO_CI_PODMAN_HELPER_DIR=$BREW_PREFIX/opt/podman/libexec/podman" >> "$GITHUB_ENV"
          sudo mkdir -p /etc/containers
          if ! test -f /etc/containers/policy.json; then
            printf '{"default":[{"type":"insecureAcceptAnything"}]}\n' | sudo tee /etc/containers/policy.json >/dev/null
          fi
          if ! grep -qs unqualified-search-registries /etc/containers/registries.conf; then
            printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee -a /etc/containers/registries.conf >/dev/null
          fi
          # A system-level storage.conf left behind by a distro podman install pins the
          # rootful runroot/graphroot, which Podman 6 honors literally for rootless
          # users. Seed a rootless-safe user-level storage.conf so the default service
          # always resolves user paths.
          mkdir -p "$HOME/.config/containers"
          if ! test -f "$HOME/.config/containers/storage.conf"; then
            printf '[storage]\ndriver = "overlay"\nrunroot = "%s"\ngraphroot = "%s"\n' \
              "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers" \
              "$HOME/.local/share/containers/storage" > "$HOME/.config/containers/storage.conf"
          fi
          podman --version

      - name: Assert Podman 6 host contract
        if: ${{ matrix.cell == 'podman-linux' }}
        run: |
          MINIMUM="6.0.0"
          version_output="$(podman --version 2>/dev/null || true)"
          numbers="$(printf '%s\n' "$version_output" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          remediation="Install Podman >= $MINIMUM (Homebrew formula: podman) before Podman-backed CI runs."
          if test -z "$numbers"; then
            echo "::error title=podman6-contract::Could not parse a Podman version from '${version_output:-<no podman on PATH>}'. $remediation"
            exit 1
          fi
          major="${numbers%%.*}"
          minor_patch="${numbers#*.}"
          minor="${minor_patch%%.*}"
          patch="${minor_patch#*.}"
          floor_major="${MINIMUM%%.*}"
          floor_minor_patch="${MINIMUM#*.}"
          floor_minor="${floor_minor_patch%%.*}"
          floor_patch="${floor_minor_patch#*.}"
          meets=yes
          if test "$major" -lt "$floor_major"; then
            meets=no
          elif test "$major" -eq "$floor_major"; then
            if test "$minor" -lt "$floor_minor"; then
              meets=no
            elif test "$minor" -eq "$floor_minor" && test "$patch" -lt "$floor_patch"; then
              meets=no
            fi
          fi
          if test "$meets" = no; then
            echo "::error title=podman6-contract::Podman $numbers (from '$version_output') does not satisfy the >= $MINIMUM host contract. $remediation"
            exit 1
          fi
          echo "podman6-contract: $numbers satisfies >= $MINIMUM"

      - name: Start Podman socket
        if: ${{ matrix.cell == 'podman-linux' }}
        run: |
          sudo sysctl net.ipv4.ip_unprivileged_port_start=0
          podman system service --time=0 unix:///tmp/podman.sock > /tmp/podman-service.log 2>&1 &
          echo "$!" > /tmp/podman-service.pid
          for _ in {1..30}; do
            test -S /tmp/podman.sock && break
            sleep 1
          done
          test -S /tmp/podman.sock
          echo "LANDO_TEST_PODMAN_SOCKET=/tmp/podman.sock" >> "$GITHUB_ENV"
          echo "LANDO_CONFIG__default_provider_id=${{ matrix.provider }}" >> "$GITHUB_ENV"

      - name: Configure Docker socket
        if: ${{ matrix.cell == 'docker-engine-linux' }}
        run: |
          test -S /var/run/docker.sock
          echo "LANDO_TEST_DOCKER_SOCKET=/var/run/docker.sock" >> "$GITHUB_ENV"
          echo "LANDO_CONFIG__default_provider_id=${{ matrix.provider }}" >> "$GITHUB_ENV"

      - name: Run provider contract tests
        if: ${{ matrix.installable == true }}
        run: |
          bun test sdk/test/contract/provider.test.ts sdk/test/contract/service.test.ts
          bun test plugins/provider-lando/test/contract.integration.test.ts
          bun test plugins/provider-docker/test/contract.integration.test.ts
          bun test plugins/provider-podman/test/contract.integration.test.ts
          bun test plugins/provider-podman/test/capabilities.test.ts

      - name: Teardown Podman
        if: ${{ always() && matrix.cell == 'podman-linux' }}
        run: |
          podman ps -aq --filter "name=lando-" | xargs -r podman rm -f || true
          podman network ls --format '{{.Name}}' | grep '^lando-' | xargs -r podman network rm || true
          if test -f /tmp/podman-service.pid; then kill "$(cat /tmp/podman-service.pid)" || true; fi
          rm -f /tmp/podman.sock /tmp/podman-service.pid

      - name: Collect provider matrix diagnostics
        if: failure()
        run: |
          mkdir -p provider-matrix-diagnostics
          cp /tmp/podman-service.log provider-matrix-diagnostics/podman-service.log || true
          journalctl --no-pager --since "-30 minutes" > provider-matrix-diagnostics/journalctl.log 2>&1 || true

      - name: Upload provider matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-matrix-diagnostics-${{ matrix.cell }}
          path: provider-matrix-diagnostics
          if-no-files-found: ignore
          retention-days: 7
