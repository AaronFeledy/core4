# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-provider-matrix-workflow.ts instead.
name: provider-matrix

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-contracts:
    env:
      LANDO_TEST_PROVIDER_LANDO_MACHINE_LIFECYCLE: ${{ vars.LANDO_TEST_PROVIDER_LANDO_MACHINE_LIFECYCLE }}
      LANDO_TEST_PROVIDER_PODMAN_MACHINE_LIFECYCLE: ${{ vars.LANDO_TEST_PROVIDER_PODMAN_MACHINE_LIFECYCLE }}
      LANDO_TEST_PODMAN_COMMAND: ${{ vars.LANDO_TEST_PODMAN_COMMAND }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - cell: docker-desktop-macos
            engine: Docker Desktop
            runs-on: macos-15
            provider: docker
            release-blocking: false
            install-podman6: false
            setup: advisory
            advisory-skip: true
            notice: "Docker Desktop requires a licensed desktop app and is not installed on GitHub-hosted macOS runners."
          - cell: docker-engine-linux
            engine: Docker Engine
            runs-on: ubuntu-24.04
            provider: docker
            release-blocking: true
            install-podman6: false
            setup: docker-engine
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: podman-desktop-macos
            engine: Podman Desktop
            runs-on: macos-15
            provider: podman
            release-blocking: false
            install-podman6: false
            setup: advisory
            advisory-skip: true
            notice: "Podman Desktop is not installable in GitHub-hosted CI; run this cell on a prepared self-hosted runner."
          - cell: lando-machine-macos
            engine: Lando managed Podman machine on macOS
            runs-on: macos-15
            provider: lando
            release-blocking: false
            install-podman6: false
            setup: machine-lifecycle
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: lando-machine-windows
            engine: Lando managed Podman machine on Windows
            runs-on: windows-2022
            provider: lando
            release-blocking: false
            install-podman6: false
            setup: machine-lifecycle
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: podman-machine-macos
            engine: System Podman machine on macOS
            runs-on: macos-15
            provider: podman
            release-blocking: false
            install-podman6: false
            setup: machine-lifecycle
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: podman-machine-windows
            engine: System Podman machine on Windows
            runs-on: windows-2022
            provider: podman
            release-blocking: false
            install-podman6: false
            setup: machine-lifecycle
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: lando-podman6-linux
            engine: Lando managed Podman 6
            runs-on: ubuntu-24.04
            provider: lando
            release-blocking: true
            install-podman6: false
            setup: managed-lando
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: podman-podman6-linux
            engine: Podman 6
            runs-on: ubuntu-24.04
            provider: podman
            release-blocking: true
            install-podman6: true
            setup: homebrew-podman
            advisory-skip: false
            notice: "GitHub-hosted CI runtime is available."
          - cell: lima-macos
            engine: Lima
            runs-on: macos-15
            provider: docker
            release-blocking: false
            install-podman6: false
            setup: advisory
            advisory-skip: true
            notice: "Lima provider coverage needs a prepared macOS runtime; GitHub-hosted runners do not ship a reusable Lima daemon."
          - cell: orbstack-macos
            engine: OrbStack
            runs-on: macos-15
            provider: docker
            release-blocking: false
            install-podman6: false
            setup: advisory
            advisory-skip: true
            notice: "OrbStack is a macOS desktop runtime and is not installable in GitHub-hosted CI."
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Notice unsupported hosted runner cell
        if: ${{ matrix['advisory-skip'] == true }}
        run: |
          echo "::notice title=provider-matrix::${{ matrix.engine }} skipped: ${{ matrix.notice }}"

      - name: Provision Linux rootless runtime prerequisites
        if: ${{ matrix.cell == 'lando-podman6-linux' || matrix.cell == 'podman-podman6-linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! grep -q "^$(id -un):" /etc/subuid; then
            echo "$(id -un):100000:65536" | sudo tee -a /etc/subuid
          fi
          if ! grep -q "^$(id -un):" /etc/subgid; then
            echo "$(id -un):100000:65536" | sudo tee -a /etc/subgid
          fi
          sudo sysctl net.ipv4.ip_unprivileged_port_start=0
          if test -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns; then
            sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if ! grep -q "systemd.unified_cgroup_hierarchy" /proc/cmdline; then
            echo "::notice title=ci-runtime::cgroups v2 unified hierarchy assumed via ubuntu-24.04 default (systemd.unified_cgroup_hierarchy)"
          fi
          sudo mkdir -p /sys/fs/cgroup/user.slice/user-$(id -u).slice
          sudo chown -R "$(id -un)" "/sys/fs/cgroup/user.slice/user-$(id -u).slice" || true

      - name: Build Linux x64 binary for managed Lando provider
        if: ${{ matrix.cell == 'lando-podman6-linux' }}
        run: |
          mkdir -p dist
          bun run --filter='@lando/core' build:manifest
          bun run --filter='@lando/core' build:log-file-helper
          bun -e "const fs = await import('node:fs/promises'); await fs.cp('core/dist/log-file-access', 'dist/log-file-access', { recursive: true });"
          bun run scripts/build-compiled-binary.ts --target bun-linux-x64 --outfile ./dist/lando --minify --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./dist/lando
          ./dist/lando --version

      - name: Prepare managed Lando provider from committed manifest
        if: ${{ matrix.cell == 'lando-podman6-linux' }}
        run: |
          test -z "${LANDO_RUNTIME_BUNDLE_MANIFEST:-}"
          test -z "${LANDO_RUNTIME_BUNDLE_URL:-}"
          test -z "${LANDO_RUNTIME_BUNDLE_SHA256:-}"
          export LANDO_USER_CONF_ROOT="$RUNNER_TEMP/lando-conf"
          export LANDO_USER_DATA_ROOT="$RUNNER_TEMP/lando-data"
          export LANDO_USER_CACHE_ROOT="$RUNNER_TEMP/lando-cache"
          echo "LANDO_USER_CONF_ROOT=$LANDO_USER_CONF_ROOT" >> "$GITHUB_ENV"
          echo "LANDO_USER_DATA_ROOT=$LANDO_USER_DATA_ROOT" >> "$GITHUB_ENV"
          echo "LANDO_USER_CACHE_ROOT=$LANDO_USER_CACHE_ROOT" >> "$GITHUB_ENV"
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "$XDG_RUNTIME_DIR"
          cat > "$RUNNER_TEMP/lando-storage.conf" <<EOF
          [storage]
          driver = "overlay"

          [storage.options.overlay]
          mount_program = "$LANDO_USER_DATA_ROOT/runtime/bin/fuse-overlayfs"
          EOF
          export CONTAINERS_STORAGE_CONF="$RUNNER_TEMP/lando-storage.conf"
          echo "CONTAINERS_STORAGE_CONF=$CONTAINERS_STORAGE_CONF" >> "$GITHUB_ENV"
          dist/lando setup --yes --provider=lando --skip-install-ca --skip-shell-integration --skip-file-sync

      - name: Verify managed Lando socket
        if: ${{ matrix.cell == 'lando-podman6-linux' }}
        run: |
          for _ in {1..30}; do
            test -S "$RUNNER_TEMP/lando-data/runtime/run/podman.sock" && break
            sleep 1
          done
          test -S "$RUNNER_TEMP/lando-data/runtime/run/podman.sock"
          "$RUNNER_TEMP/lando-data/runtime/bin/podman" --version
          dist/lando doctor --format json > /tmp/lando-managed-provider-doctor.json
          echo "LANDO_TEST_PODMAN_SOCKET=$RUNNER_TEMP/lando-data/runtime/run/podman.sock" >> "$GITHUB_ENV"
          echo "LANDO_CONFIG__default_provider_id=lando" >> "$GITHUB_ENV"

      - name: Install Podman 6 toolchain (Homebrew; Ubuntu/OBS lack Podman 6)
        if: ${{ matrix.cell == 'podman-podman6-linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! command -v brew >/dev/null 2>&1; then
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          brew install podman
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LANDO_CI_PODMAN_HELPER_DIR=$BREW_PREFIX/opt/podman/libexec/podman" >> "$GITHUB_ENV"
          # The OCI runtime and monitor are separate Homebrew formulae that Homebrew does
          # not link onto PATH, so a bundle-staging step that searches PATH would copy
          # the runner's preinstalled (older) crun/conmon and Podman 6 would reject their
          # OCI config version. Export the Podman 6 toolchain directories so staging can
          # prefer them over the system copies.
          toolchain_dirs="$BREW_PREFIX/opt/podman/libexec/podman:$BREW_PREFIX/bin"
          for dep in crun conmon fuse-overlayfs; do
            dep_prefix="$(brew --prefix "$dep" 2>/dev/null || true)"
            if test -n "$dep_prefix" && test -d "$dep_prefix/bin"; then
              toolchain_dirs="$dep_prefix/bin:$toolchain_dirs"
            fi
          done
          echo "LANDO_CI_PODMAN_TOOLCHAIN_DIRS=$toolchain_dirs" >> "$GITHUB_ENV"
          # The managed runtime resolves its OCI runtime from the default system search
          # list (/usr/bin/crun first), not from the bundle or helper_binaries_dir, so a
          # runner's preinstalled crun that predates Podman 6 makes container start fail
          # with "crun: unknown version specified". Overwrite the default-path crun with
          # the Podman 6 toolchain build (its interpreter/RPATH stay absolute to the
          # Homebrew prefix, which persists on the runner).
          crun_prefix="$(brew --prefix crun 2>/dev/null || true)"
          if test -n "$crun_prefix" && test -x "$crun_prefix/bin/crun"; then
            sudo install -m 0755 "$crun_prefix/bin/crun" /usr/bin/crun
          fi
          # User-level container configs override any system files wholesale, so seed
          # them instead of mutating /etc: a distro-era /etc/containers/registries.conf
          # can be v1-format TOML, and appending v2 keys to it makes every podman
          # engine load fail with "registries.conf must be in v2 format but is in v1".
          mkdir -p "$HOME/.config/containers"
          if ! test -f "$HOME/.config/containers/registries.conf"; then
            printf 'unqualified-search-registries = ["docker.io"]\n' > "$HOME/.config/containers/registries.conf"
          fi
          if ! test -f "$HOME/.config/containers/policy.json" && ! test -f /etc/containers/policy.json; then
            printf '{"default":[{"type":"insecureAcceptAnything"}]}\n' > "$HOME/.config/containers/policy.json"
          fi
          # A system-level storage.conf left behind by a distro podman install pins the
          # rootful runroot/graphroot, which Podman 6 honors literally for rootless
          # users. Seed a rootless-safe user-level storage.conf so the default service
          # always resolves user paths.
          if ! test -f "$HOME/.config/containers/storage.conf"; then
            printf '[storage]\ndriver = "overlay"\nrunroot = "%s"\ngraphroot = "%s"\n' \
              "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers" \
              "$HOME/.local/share/containers/storage" > "$HOME/.config/containers/storage.conf"
          fi
          podman --version

      - name: Assert Podman 6 host contract
        if: ${{ matrix.cell == 'podman-podman6-linux' }}
        run: |
          MINIMUM="6.0.0"
          version_output="$(podman --version 2>/dev/null || true)"
          numbers="$(printf '%s\n' "$version_output" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          remediation="Install Podman >= $MINIMUM (Homebrew formula: podman) before Podman-backed CI runs."
          if test -z "$numbers"; then
            echo "::error title=podman6-contract::Could not parse a Podman version from '${version_output:-<no podman on PATH>}'. $remediation"
            exit 1
          fi
          major="${numbers%%.*}"
          minor_patch="${numbers#*.}"
          minor="${minor_patch%%.*}"
          patch="${minor_patch#*.}"
          floor_major="${MINIMUM%%.*}"
          floor_minor_patch="${MINIMUM#*.}"
          floor_minor="${floor_minor_patch%%.*}"
          floor_patch="${floor_minor_patch#*.}"
          meets=yes
          if test "$major" -lt "$floor_major"; then
            meets=no
          elif test "$major" -eq "$floor_major"; then
            if test "$minor" -lt "$floor_minor"; then
              meets=no
            elif test "$minor" -eq "$floor_minor" && test "$patch" -lt "$floor_patch"; then
              meets=no
            fi
          fi
          if test "$meets" = no; then
            echo "::error title=podman6-contract::Podman $numbers (from '$version_output') does not satisfy the >= $MINIMUM host contract. $remediation"
            exit 1
          fi
          echo "podman6-contract: $numbers satisfies >= $MINIMUM"

      - name: Start Podman socket
        if: ${{ matrix.cell == 'podman-podman6-linux' }}
        run: |
          sudo sysctl net.ipv4.ip_unprivileged_port_start=0
          podman system service --time=0 unix:///tmp/podman.sock > /tmp/podman-service.log 2>&1 &
          echo "$!" > /tmp/podman-service.pid
          for _ in {1..30}; do
            test -S /tmp/podman.sock && break
            sleep 1
          done
          if test -S /tmp/podman.sock; then
            echo "LANDO_TEST_PODMAN_SOCKET=/tmp/podman.sock" >> "$GITHUB_ENV"
          else
            echo "::warning title=provider-matrix::Podman socket was not ready; acceptance runner will emit a structured skip."
          fi
          echo "LANDO_CONFIG__default_provider_id=${{ matrix.provider }}" >> "$GITHUB_ENV"

      - name: Configure Docker socket
        if: ${{ matrix.cell == 'docker-engine-linux' }}
        run: |
          test -S /var/run/docker.sock
          echo "LANDO_TEST_DOCKER_SOCKET=/var/run/docker.sock" >> "$GITHUB_ENV"
          echo "LANDO_CONFIG__default_provider_id=${{ matrix.provider }}" >> "$GITHUB_ENV"

      - name: Pull live acceptance fixture images
        if: ${{ matrix['release-blocking'] == true }}
        run: |
          for image in node:22-alpine postgres:16-alpine alpine:3.20; do
            case "${{ matrix.cell }}" in
              lando-podman6-linux)
                CONTAINERS_REGISTRIES_CONF="$RUNNER_TEMP/lando-data/runtime/config/registries.conf" "$RUNNER_TEMP/lando-data/runtime/bin/podman" --url "unix://$LANDO_TEST_PODMAN_SOCKET" pull "$image"
                ;;
              podman-podman6-linux)
                podman --url "unix://$LANDO_TEST_PODMAN_SOCKET" pull "$image"
                ;;
              docker-engine-linux)
                docker pull "$image"
                ;;
            esac
          done

      - name: Run structured provider acceptance cell
        if: always()
        run: |
          bun run scripts/provider-matrix-acceptance.ts --cell '${{ matrix.cell }}' --report-dir provider-matrix-reports

      - name: Upload provider matrix cell report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-matrix-report-${{ matrix.cell }}
          path: provider-matrix-reports/${{ matrix.cell }}.json
          if-no-files-found: error
          retention-days: 14

      - name: Teardown Podman
        if: ${{ always() && matrix.cell == 'podman-podman6-linux' }}
        run: |
          podman ps -aq --filter "name=lando-" | xargs -r podman rm -f || true
          podman network ls --format '{{.Name}}' | grep '^lando-' | xargs -r podman network rm || true
          if test -f /tmp/podman-service.pid; then kill "$(cat /tmp/podman-service.pid)" || true; fi
          rm -f /tmp/podman.sock /tmp/podman-service.pid

      - name: Teardown managed Lando runtime
        if: ${{ always() && matrix.cell == 'lando-podman6-linux' }}
        run: |
          dist/lando poweroff || true
          LANDO_PODMAN="$RUNNER_TEMP/lando-data/runtime/bin/podman"
          LANDO_PODMAN_ARGS=(--root "$RUNNER_TEMP/lando-data/runtime/storage" --runroot "$RUNNER_TEMP/lando-data/runtime/run" --config "$RUNNER_TEMP/lando-data/runtime/config")
          if test -x "$LANDO_PODMAN"; then
            "$LANDO_PODMAN" "${LANDO_PODMAN_ARGS[@]}" ps -aq --filter "name=lando-" | xargs -r "$LANDO_PODMAN" "${LANDO_PODMAN_ARGS[@]}" rm -f || true
            "$LANDO_PODMAN" "${LANDO_PODMAN_ARGS[@]}" network ls --format '{{.Name}}' | grep '^lando-' | xargs -r "$LANDO_PODMAN" "${LANDO_PODMAN_ARGS[@]}" network rm || true
          fi

      - name: Collect provider matrix diagnostics
        if: failure()
        run: |
          mkdir -p provider-matrix-diagnostics
          cp /tmp/podman-service.log provider-matrix-diagnostics/podman-service.log || true
          if test -f "${LANDO_USER_DATA_ROOT:-}/runtime/run/service.log"; then
            cp "$LANDO_USER_DATA_ROOT/runtime/run/service.log" provider-matrix-diagnostics/lando-managed-service.log || true
          fi
          if test -d "${LANDO_USER_CACHE_ROOT:-}/logs"; then
            cp -r "$LANDO_USER_CACHE_ROOT/logs" provider-matrix-diagnostics/lando-logs || true
          fi
          journalctl --no-pager --since "-30 minutes" > provider-matrix-diagnostics/journalctl.log 2>&1 || true

      - name: Upload provider matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-matrix-diagnostics-${{ matrix.cell }}
          path: provider-matrix-diagnostics
          if-no-files-found: ignore
          retention-days: 7
