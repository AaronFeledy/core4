name: php-base-images

on:
  push:
    branches: [main]
    paths:
      - images/php/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4]
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish PHP ${{ matrix.php }} base
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: images/php/${{ matrix.php }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/php:${{ matrix.php }}-apache
            ghcr.io/${{ github.repository_owner }}/php:${{ matrix.php }}-apache-${{ github.sha }}
