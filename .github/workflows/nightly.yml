# Generated by scripts/codegen.ts — do not hand-edit. Edit scripts/build-nightly-workflow.ts instead.
name: nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  file-sync-contract-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run file-sync contract matrix (linux-x64)
        run: bun test plugins/file-sync-mutagen/test/contract.test.ts
        env:
          LANDO_TEST_FILE_SYNC_LIVE: "1"

  file-sync-contract-darwin-arm64:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run file-sync contract matrix (darwin-arm64)
        run: bun test plugins/file-sync-mutagen/test/contract.test.ts
        env:
          LANDO_TEST_FILE_SYNC_LIVE: "1"

  file-sync-contract-darwin-x64:
    runs-on: macos-15-intel
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run file-sync contract matrix (darwin-x64)
        run: bun test plugins/file-sync-mutagen/test/contract.test.ts
        env:
          LANDO_TEST_FILE_SYNC_LIVE: "1"

  file-sync-contract-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run file-sync contract matrix (windows-x64)
        run: bun test plugins/file-sync-mutagen/test/contract.test.ts
        env:
          LANDO_TEST_FILE_SYNC_LIVE: "1"

  provider-lando-e2e-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Podman 6 toolchain (Homebrew; Ubuntu/OBS lack Podman 6)
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap fuse-overlayfs
          if ! command -v brew >/dev/null 2>&1; then
            test -x /home/linuxbrew/.linuxbrew/bin/brew
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          brew install podman
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LANDO_CI_PODMAN_HELPER_DIR=$BREW_PREFIX/opt/podman/libexec/podman" >> "$GITHUB_ENV"
          sudo mkdir -p /etc/containers
          if ! test -f /etc/containers/policy.json; then
            printf '{"default":[{"type":"insecureAcceptAnything"}]}\n' | sudo tee /etc/containers/policy.json >/dev/null
          fi
          if ! grep -qs unqualified-search-registries /etc/containers/registries.conf; then
            printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee -a /etc/containers/registries.conf >/dev/null
          fi
          # A system-level storage.conf left behind by a distro podman install pins the
          # rootful runroot/graphroot, which Podman 6 honors literally for rootless
          # users. Seed a rootless-safe user-level storage.conf so the default service
          # always resolves user paths.
          mkdir -p "$HOME/.config/containers"
          if ! test -f "$HOME/.config/containers/storage.conf"; then
            printf '[storage]\ndriver = "overlay"\nrunroot = "%s"\ngraphroot = "%s"\n' \
              "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/containers" \
              "$HOME/.local/share/containers/storage" > "$HOME/.config/containers/storage.conf"
          fi
          podman --version

      - name: Assert Podman 6 host contract
        run: |
          MINIMUM="6.0.0"
          version_output="$(podman --version 2>/dev/null || true)"
          numbers="$(printf '%s\n' "$version_output" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          remediation="Install Podman >= $MINIMUM (Homebrew formula: podman) before Podman-backed CI runs."
          if test -z "$numbers"; then
            echo "::error title=podman6-contract::Could not parse a Podman version from '${version_output:-<no podman on PATH>}'. $remediation"
            exit 1
          fi
          major="${numbers%%.*}"
          minor_patch="${numbers#*.}"
          minor="${minor_patch%%.*}"
          patch="${minor_patch#*.}"
          floor_major="${MINIMUM%%.*}"
          floor_minor_patch="${MINIMUM#*.}"
          floor_minor="${floor_minor_patch%%.*}"
          floor_patch="${floor_minor_patch#*.}"
          meets=yes
          if test "$major" -lt "$floor_major"; then
            meets=no
          elif test "$major" -eq "$floor_major"; then
            if test "$minor" -lt "$floor_minor"; then
              meets=no
            elif test "$minor" -eq "$floor_minor" && test "$patch" -lt "$floor_patch"; then
              meets=no
            fi
          fi
          if test "$meets" = no; then
            echo "::error title=podman6-contract::Podman $numbers (from '$version_output') does not satisfy the >= $MINIMUM host contract. $remediation"
            exit 1
          fi
          echo "podman6-contract: $numbers satisfies >= $MINIMUM"

      - name: Enable unprivileged port binding
        run: sudo sysctl net.ipv4.ip_unprivileged_port_start=0

      - name: Start Podman socket
        run: |
          podman system service --time=0 unix:///tmp/podman.sock > /tmp/podman-service.log 2>&1 &
          echo "$!" > /tmp/podman-service.pid
          for i in {1..30}; do test -S /tmp/podman.sock && exit 0; sleep 1; done
          cat /tmp/podman-service.log
          exit 1

      - name: Build Linux x64 binary
        run: |
          bun run --filter='@lando/core' build:manifest
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-linux-x64 --outfile ./core/dist/lando --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./core/dist/lando
          ./core/dist/lando --version

      - name: Run smoke e2e scenarios
        run: |
          LANDO_MVP_BINARY_PATH="$GITHUB_WORKSPACE/core/dist/lando" LANDO_SCENARIO_E2E_BINARY="$GITHUB_WORKSPACE/core/dist/lando" bun test core/test/scenario --test-name-pattern="@smoke"
        env:
          LANDO_TEST_PODMAN_SOCKET: /tmp/podman.sock
          LANDO_CONFIG__default_provider_id: lando

      - name: Run non-smoke e2e scenarios
        run: |
          LANDO_MVP_BINARY_PATH="$GITHUB_WORKSPACE/core/dist/lando" LANDO_SCENARIO_E2E_BINARY="$GITHUB_WORKSPACE/core/dist/lando" bun test core/test/scenario --test-name-pattern="^(?!.*@smoke).*$"
        env:
          LANDO_TEST_PODMAN_SOCKET: /tmp/podman.sock
          LANDO_CONFIG__default_provider_id: lando

      - name: Teardown Podman
        if: always()
        run: |
          podman ps -aq --filter "name=lando-" | xargs -r podman rm -f || true
          podman network ls --format '{{.Name}}' | grep '^lando-' | xargs -r podman network rm || true
          if test -f /tmp/podman-service.pid; then kill "$(cat /tmp/podman-service.pid)" || true; fi
          rm -f /tmp/podman.sock /tmp/podman-service.pid

      - name: Collect provider-lando e2e diagnostics
        if: failure()
        run: |
          mkdir -p provider-lando-e2e-diagnostics
          cp /tmp/podman-service.log provider-lando-e2e-diagnostics/podman-service.log || true
          journalctl --no-pager --since "-30 minutes" > provider-lando-e2e-diagnostics/journalctl.log 2>&1 || true

      - name: Upload provider-lando e2e diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-lando-e2e-diagnostics-linux-x64
          path: provider-lando-e2e-diagnostics
          if-no-files-found: ignore
          retention-days: 7

  distribution-rehearsal-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OCLIF manifest
        run: bun run --filter='@lando/core' build:manifest

      - name: Compile all platform binaries
        run: |
          mkdir -p dist/bundle
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-darwin-arm64 --outfile ./dist/bundle/lando-darwin-arm64 --sourcemap=external
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-darwin-x64 --outfile ./dist/bundle/lando-darwin-x64 --sourcemap=external
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-linux-arm64 --outfile ./dist/bundle/lando-linux-arm64 --sourcemap=external
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-linux-x64 --outfile ./dist/bundle/lando-linux-x64 --sourcemap=external
          bun build ./core/bin/lando.ts --compile --bytecode --target=bun-windows-x64 --outfile ./dist/bundle/lando-windows-x64.exe --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-darwin-arm64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-darwin-x64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-linux-arm64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-linux-x64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-windows-x64.exe
          ./dist/bundle/lando-linux-x64 --version

      - name: Package distribution bundle
        run: bun run scripts/dist-bundle.ts dist/bundle

      - name: Verify SHA256SUMS match the binaries
        run: bun run scripts/dist-bundle.ts --verify dist/bundle

      - name: Upload distribution rehearsal bundle
        uses: actions/upload-artifact@v4
        with:
          name: lando-dist-rehearsal-v4.0.0-nightly.${{ github.run_number }}
          path: dist/bundle
          if-no-files-found: error
          retention-days: 14
