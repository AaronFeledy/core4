  distribution-rehearsal-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OCLIF manifest
        run: bun run --filter='@lando/core' build:manifest

      - name: Compile all platform binaries
        run: |
          mkdir -p dist/bundle
          bun run --filter='@lando/core' build:log-file-helper
          bun -e "const fs = await import('node:fs/promises'); await fs.cp('core/dist/log-file-access', 'dist/bundle/log-file-access', { recursive: true });"
          bun install --frozen-lockfile --os="*" --cpu="*"
          bun run scripts/build-compiled-binary.ts --target bun-darwin-arm64 --outfile ./dist/bundle/lando-darwin-arm64 --minify --sourcemap=external
          bun run scripts/build-compiled-binary.ts --target bun-darwin-x64 --outfile ./dist/bundle/lando-darwin-x64 --minify --sourcemap=external
          bun run scripts/build-compiled-binary.ts --target bun-linux-arm64 --outfile ./dist/bundle/lando-linux-arm64 --minify --sourcemap=external
          bun run scripts/build-compiled-binary.ts --target bun-linux-x64 --outfile ./dist/bundle/lando-linux-x64 --minify --sourcemap=external
          bun run scripts/build-compiled-binary.ts --target bun-windows-x64 --outfile ./dist/bundle/lando-windows-x64.exe --minify --sourcemap=external
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-darwin-arm64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-darwin-x64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-linux-arm64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-linux-x64
          bun run scripts/sanitize-compiled-binary.ts ./dist/bundle/lando-windows-x64.exe
          ./dist/bundle/lando-linux-x64 --version

      - name: Package distribution bundle
        run: bun run scripts/dist-bundle.ts dist/bundle

      - name: Verify SHA256SUMS match the binaries
        run: bun run scripts/dist-bundle.ts --verify dist/bundle

      - name: Upload distribution rehearsal bundle
        uses: actions/upload-artifact@v4
        with:
          name: lando-dist-rehearsal-v4.0.0-nightly.${{ github.run_number }}
          path: dist/bundle
          if-no-files-found: error
          retention-days: 14
